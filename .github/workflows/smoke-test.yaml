name: 'Smoke Test'
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  smoke-test:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      issues: 'write'

    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v7'
      - name: 'Install Bun'
        uses: 'oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6'
        with:
          bun-version: 'latest'
      - name: 'Install Bun packages'
        run: 'bun install --frozen-lockfile'
      - name: 'Run smoke test'
        id: 'smoke-test'
        continue-on-error: true
        run: 'bun run src/scripts/smoke-test.ts 2> failures.json'
      - name: 'Report failures'
        if: steps.smoke-test.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CURRENT_BODY=$(gh api repos/${{ github.repository }}/issues/576 --jq '.body')

          while IFS= read -r entry; do
            WORD=$(echo "$entry" | jq -r '.word')
            IPA=$(echo "$entry" | jq -r '.ipa')
            ERROR=$(echo "$entry" | jq -r '.error')

            if echo "$CURRENT_BODY" | grep -qF "\`${IPA}\`"; then
              echo "Skipping duplicate IPA: ${IPA}"
              continue
            fi

            NEW_ROW="| ${WORD} | \`${IPA}\` | ${ERROR} | ${TIMESTAMP} |"
            CURRENT_BODY="${CURRENT_BODY}"$'\n'"${NEW_ROW}"
          done < <(jq -c '.[]' failures.json)

          gh api repos/${{ github.repository }}/issues/576 \
            --method PATCH \
            --input - \
            <<< "$(jq -n --arg body "$CURRENT_BODY" '{"body": $body}')"
